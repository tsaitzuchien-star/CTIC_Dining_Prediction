<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中創園區 - 用餐預測戰情室 V3 (全自動雲端版)</title>
    <!-- 引入 Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: "Microsoft JhengHei", sans-serif; }
        .kpi-card { border: none; border-radius: 15px; transition: transform 0.3s; position: relative; overflow: hidden; }
        .kpi-card:hover { transform: translateY(-5px); }
        .table-container { background-color: #1e293b; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 20px;}
        .table { color: #f8fafc; margin-bottom: 0; }
        .badge-usi { background-color: #3b82f6; } 
        .badge-itri { background-color: #10b981; } 
        .badge-cash { background-color: #f59e0b; color: #1e293b; } 
        .refresh-tag { font-size: 0.8rem; color: #94a3b8; }
        
        /* 準確率標籤樣式 (服貼右上角緞帶) */
        .accuracy-badge {
            position: absolute; top: 0; right: 0;
            background-color: rgba(255,255,255,0.2); 
            padding: 5px 12px; 
            border-bottom-left-radius: 12px; 
            font-weight: bold; font-size: 0.85rem; display: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">🍽️ 中創園區 用餐預測戰情室</h2>
            <div class="refresh-tag" id="last-update">最後更新：載入中...</div>
        </div>

        <!-- 🚀 雲端自動對帳狀態區 -->
        <div class="card bg-dark border-secondary mb-4 shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="text-warning mb-1">🎯 雲端自動準確度回測系統</h5>
                    <small class="text-white-50">系統將自動連線試算表抓取下午卡機實際名單，進行無縫比對與計算。</small>
                </div>
                <div class="text-end">
                    <span class="badge bg-success px-3 py-2" style="font-size: 0.9rem;">
                        <span class="spinner-grow spinner-grow-sm me-1" role="status" aria-hidden="true"></span>
                        雲端自動連線中
                    </span>
                </div>
            </div>
        </div>

        <!-- KPI 數據區 -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card kpi-card bg-primary shadow-sm">
                    <div class="accuracy-badge" id="acc-total">準確率 0%</div>
                    <div class="card-body text-center pb-4 pt-3">
                        <h6 class="text-white-50 mt-3">本日總預測人數</h6>
                        <h1 class="display-4 fw-bold mb-0" id="total-count">0</h1>
                        <div class="text-info mt-2" id="actual-total-text" style="display:none; font-size:0.9rem;">實際命中: <span>0</span></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card shadow-sm" style="background-color: #2563eb;">
                    <div class="accuracy-badge" id="acc-usi">準確率 0%</div>
                    <div class="card-body text-center pb-4 pt-3">
                        <h6 class="text-white-50 mt-3">環電預測</h6>
                        <h1 class="display-4 fw-bold mb-0" id="usi-count">0</h1>
                        <div class="text-info mt-2" id="actual-usi-text" style="display:none; font-size:0.9rem;">實際命中: <span>0</span></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card shadow-sm" style="background-color: #059669;">
                    <div class="accuracy-badge" id="acc-itri">準確率 0%</div>
                    <div class="card-body text-center pb-4 pt-3">
                        <h6 class="text-white-50 mt-3">工研院預測</h6>
                        <h1 class="display-4 fw-bold mb-0" id="itri-count">0</h1>
                        <div class="text-info mt-2" id="actual-itri-text" style="display:none; font-size:0.9rem;">實際命中: <span>0</span></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card shadow-sm" style="background-color: #d97706;">
                    <div class="accuracy-badge text-dark" id="acc-cash">準確率 0%</div>
                    <div class="card-body text-center pb-4 pt-3">
                        <h6 class="text-dark fw-bold mt-3">現金給付</h6>
                        <h1 class="display-4 fw-bold text-dark mb-0" id="cash-count">0</h1>
                        <div class="text-dark mt-2" id="actual-cash-text" style="display:none; font-size:0.9rem;">實際命中: <span>0</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ⚠️ 預測失敗 (放鳥) 名單區 (預設隱藏) -->
        <div class="table-container border border-danger" id="no-show-container" style="display: none;">
            <h5 class="text-danger mb-3">⚠️ 預測會來卻沒來 (未命中名單)</h5>
            <div class="table-responsive">
                <table class="table table-hover table-sm">
                    <thead>
                        <tr class="text-white-50 border-bottom border-danger">
                            <th>早盤進園時間</th>
                            <th>門禁卡機位置</th>
                            <th>所屬公司</th>
                            <th>員工姓名</th>
                            <th>卡號(CardID)</th>
                        </tr>
                    </thead>
                    <tbody id="noshow-body">
                        <!-- 資料由 JS 自動填充 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 明細列表區 (早盤預測) -->
        <div class="table-container">
            <h5 class="mb-3">🕒 今日早盤：即時進園常客明細 (預測名單)</h5>
            <div class="table-responsive">
                <table class="table table-hover table-sm">
                    <thead>
                        <tr class="text-white-50 border-bottom">
                            <th>進園時間</th>
                            <th>門禁卡機位置</th>
                            <th>所屬公司</th>
                            <th>員工姓名</th>
                            <th>卡號(CardID)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- 資料由 JS 自動填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🌟 兩把雲端金鑰：預測大腦 API 與 實際卡機 API
        const predictUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSv8X_NJDPjSVJTEkFjdBTSJKjDnZ18eyf6yBdTBq2eVT8TB6_wB-UDUUVUoF5eUJrLSnDsqpu7OhbS/pub?gid=227038804&single=true&output=csv';
        const actualUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSv8X_NJDPjSVJTEkFjdBTSJKjDnZ18eyf6yBdTBq2eVT8TB6_wB-UDUUVUoF5eUJrLSnDsqpu7OhbS/pub?gid=1955525676&single=true&output=csv';

        function updateDashboard() {
            // 第一步：先抓取早上的預測名單
            Papa.parse(predictUrl, {
                download: true,
                header: true,
                complete: function(predictResults) {
                    const rows = predictResults.data;
                    let total = 0, usi = 0, itri = 0, cash = 0;
                    let html = '';
                    let predictedList = []; // 存入記憶體

                    document.getElementById('last-update').innerText = '最後更新：' + new Date().toLocaleString();

                    rows.forEach(row => {
                        const isRegular = row['是否預測用餐'] || row['是否為常客']; 
                        if (isRegular === '是') {
                            const comp = row['公司'] || '未知';
                            const name = row['Name'] || row['姓名'] || '未辨識';
                            const empid = row['EmpID'] || row['工號'] || '';
                            const cardid = row['卡號'] || row['CardID'] || ''; 
                            // 🌟 強化版：不管試算表是 EntryTime 還是 Entry Time 都能抓到
                            const time = row['EntryTime'] || row['Entry Time'] || row['進園時間'] || '-';
                            const door = row['DoorDsc'] || '-';

                            predictedList.push({ empid: empid.trim(), cardid: cardid.trim(), name: name.trim(), comp: comp, time: time, door: door });

                            total++;
                            if (comp.includes('環電')) usi++;
                            else if (comp.includes('工研院')) itri++;
                            else cash++;

                            let badgeClass = comp.includes('環電') ? 'badge-usi' : (comp.includes('工研院') ? 'badge-itri' : 'badge-cash');

                            html += `
                                <tr class="border-bottom border-secondary">
                                    <td>${time}</td>
                                    <td>${door}</td>
                                    <td><span class="badge ${badgeClass}">${comp}</span></td>
                                    <td class="fw-bold">${name}</td>
                                    <!-- 🌟 修正：改用 text-secondary 深灰色，解決白底隱形問題 -->
                                    <td class="text-secondary" style="font-size:0.85rem;">${cardid}</td>
                                </tr>
                            `;
                        }
                    });

                    // 畫上早盤預測數字
                    document.getElementById('total-count').innerText = total;
                    document.getElementById('usi-count').innerText = usi;
                    document.getElementById('itri-count').innerText = itri;
                    document.getElementById('cash-count').innerText = cash;
                    document.getElementById('table-body').innerHTML = html;

                    // 第二步：呼叫函數去抓取下午的實際名單進行比對
                    fetchActualAndCompare(predictedList);
                }
            });
        }

        function fetchActualAndCompare(predictedList) {
            Papa.parse(actualUrl, {
                download: true,
                header: true,
                complete: function(actualResults) {
                    const actualRows = actualResults.data;
                    
                    // 抓出實際名單中的所有 CardID
                    const actualIdentifiers = actualRows.map(row => {
                        return (row['CardID'] || '').trim();
                    }).filter(id => id !== '');

                    // 🎯 智慧判斷：如果實際名單是空的(早上)，就隱藏準確率，提早結束！
                    if (actualIdentifiers.length === 0) {
                        hideAcc('total'); hideAcc('usi'); hideAcc('itri'); hideAcc('cash');
                        document.getElementById('no-show-container').style.display = 'none';
                        return;
                    }

                    // 開始計算命中率
                    let hitTotal = 0, hitUsi = 0, hitItri = 0, hitCash = 0;
                    let noShowHtml = '';
                    let noShowCount = 0;

                    predictedList.forEach(p => {
                        if (p.cardid && actualIdentifiers.includes(p.cardid)) {
                            // 命中
                            hitTotal++;
                            if (p.comp.includes('環電')) hitUsi++;
                            else if (p.comp.includes('工研院')) hitItri++;
                            else hitCash++;
                        } else {
                            // 放鳥
                            noShowCount++;
                            let badgeClass = p.comp.includes('環電') ? 'badge-usi' : (p.comp.includes('工研院') ? 'badge-itri' : 'badge-cash');
                            noShowHtml += `
                                <tr class="border-bottom border-danger">
                                    <td>${p.time}</td>
                                    <td>${p.door}</td>
                                    <td><span class="badge ${badgeClass}">${p.comp}</span></td>
                                    <td class="fw-bold text-danger">${p.name}</td>
                                    <!-- 🌟 修正：放鳥名單的卡號也改用深灰色 -->
                                    <td class="text-secondary" style="font-size:0.85rem;">${p.cardid}</td>
                                </tr>
                            `;
                        }
                    });

                    // 算準確率函式： (實際命中數 / 早上預測數) * 100
                    const calcAcc = (hit, predicted) => predicted > 0 ? Math.round((hit / predicted) * 100) : 0;
                    
                    const accTotal = calcAcc(hitTotal, predictedList.length);
                    const accUsi = calcAcc(hitUsi, predictedList.filter(p => p.comp.includes('環電')).length);
                    const accItri = calcAcc(hitItri, predictedList.filter(p => p.comp.includes('工研院')).length);
                    const accCash = calcAcc(hitCash, predictedList.filter(p => !p.comp.includes('環電') && !p.comp.includes('工研院')).length);

                    showAcc('total', accTotal, hitTotal);
                    showAcc('usi', accUsi, hitUsi);
                    showAcc('itri', accItri, hitItri);
                    showAcc('cash', accCash, hitCash);

                    if (noShowCount > 0) {
                        document.getElementById('no-show-container').style.display = 'block';
                        document.getElementById('noshow-body').innerHTML = noShowHtml;
                    } else {
                        document.getElementById('no-show-container').style.display = 'none';
                    }
                }
            });
        }

        // UI 輔助函式：顯示/隱藏準確率徽章
        function showAcc(idPrefix, acc, hit) {
            const badge = document.getElementById(`acc-${idPrefix}`);
            const textRow = document.getElementById(`actual-${idPrefix}-text`);
            badge.style.display = 'block';
            badge.innerText = `準確率 ${acc}%`;
            badge.style.backgroundColor = acc >= 90 ? 'rgba(16, 185, 129, 0.9)' : (acc >= 70 ? 'rgba(245, 158, 11, 0.9)' : 'rgba(239, 68, 68, 0.9)'); 
            textRow.style.display = 'block';
            textRow.querySelector('span').innerText = hit;
        }

        function hideAcc(idPrefix) {
            document.getElementById(`acc-${idPrefix}`).style.display = 'none';
            document.getElementById(`actual-${idPrefix}-text`).style.display = 'none';
        }

        // 啟動系統！
        updateDashboard();
        setInterval(updateDashboard, 60000); // 每 1 分鐘自動更新
    </script>
</body>
</html>
